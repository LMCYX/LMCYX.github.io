<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LYX · 小站</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: #02040a;
      color: #e0f0ff;
      overflow-x: hidden;
    }
    #bg-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      pointer-events: none;
      display: block;
    }
    .navbar {
      position: fixed;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      width: min(720px, 90%);
      height: 75px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 80px;
      z-index: 100;
      background: linear-gradient(135deg, rgba(255,255,255,.18), rgba(255,255,255,.05));
      backdrop-filter: blur(25px) saturate(160%);
      -webkit-backdrop-filter: blur(25px) saturate(160%);
      border: 1px solid rgba(255,255,255,.2);
      box-shadow: inset 0 0 40px rgba(255,255,255,.08), 0 25px 60px rgba(0,0,0,.45);
    }

    .nav-item {
      cursor: pointer;
      font-size: 20px;
      padding: 15px 30px;
      color: rgba(255,255,255,.65);
      transition: .35s;
      position: relative;
      user-select: none;
    }

    .nav-item.active,
    .nav-item:hover {
      color: white;
    }

    .nav-line {
      position: absolute;
      bottom: 12px;
      height: 4px;
      width: 80px;
      border-radius: 20px;
      background: linear-gradient(90deg, #00eaff, #ffffff);
      transition: .55s cubic-bezier(.22,1,.36,1);
    }

    .container {
      padding-top: 150px;
      width: 90%;
      max-width: 1300px;
      margin: auto;
      position: relative;
      z-index: 10;
    }

    .page {
      min-height: 80vh;
    }

  
    .home {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .home-card {
      padding: 80px 90px;
      border-radius: 45px;
      text-align: center;
      animation: float 5s infinite ease-in-out;
      background: 
        radial-gradient(ellipse at 25% 20%, rgba(120, 220, 255, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 75% 80%, rgba(60, 160, 255, 0.05) 0%, transparent 40%),
        radial-gradient(ellipse at 50% 50%, rgba(10, 14, 23, 0.7) 0%, rgba(10, 14, 23, 0.9) 100%);
      border: 1px solid rgba(255, 255, 255, 0.03);
      box-shadow: 
        0 20px 60px rgba(0, 0, 0, 0.6),
        inset 0 0 80px rgba(80, 180, 255, 0.02),
        inset 0 1px 0 rgba(255, 255, 255, 0.04),
        inset 0 -1px 0 rgba(80, 180, 255, 0.02);
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .home-card::before {
      content: '';
      position: absolute;
      top: 5%;
      left: 15%;
      width: 40%;
      height: 25%;
      background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0.06) 0%, transparent 70%);
      pointer-events: none;
      border-radius: 50%;
      filter: blur(12px);
    }

    .home-card h1 {
      font-size: 90px;
      letter-spacing: 15px;
      font-weight: 300;
      background: linear-gradient(to right, #c0e0ff, #6ab4ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 40px rgba(58, 168, 255, 0.1);
      position: relative;
      z-index: 1;
    }

    .home-card p {
      margin-top: 25px;
      font-size: 24px;
      color: #b8d6f5;
      opacity: .85;
      border-left: 3px solid rgba(58, 168, 255, 0.3);
      padding-left: 1.5rem;
      text-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
      position: relative;
      z-index: 1;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    
    .projects {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 30px;
    }

    .project-card {
      border-radius: 28px;
      padding: 1.8rem 1.5rem 1.8rem;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      display: flex;
      flex-direction: column;
      min-height: 220px;
      background: 
        radial-gradient(ellipse at 20% 25%, rgba(120, 220, 255, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 75%, rgba(60, 160, 255, 0.04) 0%, transparent 40%),
        radial-gradient(ellipse at 50% 50%, rgba(10, 14, 23, 0.5) 0%, rgba(10, 14, 23, 0.8) 100%);
      border: 1px solid rgba(255, 255, 255, 0.02);
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.4),
        inset 0 0 60px rgba(80, 180, 255, 0.02),
        inset 0 1px 0 rgba(255, 255, 255, 0.04),
        inset 0 -1px 0 rgba(80, 180, 255, 0.02);
      position: relative;
      overflow: hidden;
      cursor: pointer;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      opacity: 0;
      transform: translateX(100px);
      transition: opacity 0.6s cubic-bezier(.22,1,.36,1), transform 0.6s cubic-bezier(.22,1,.36,1), box-shadow 0.3s ease, border-color 0.3s ease;
    }

    .project-card.show {
      opacity: 1;
      transform: translateX(0);
    }

    .project-card::before {
      content: '';
      position: absolute;
      top: 8%;
      left: 10%;
      width: 35%;
      height: 20%;
      background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0.05) 0%, transparent 70%);
      pointer-events: none;
      border-radius: 50%;
      filter: blur(8px);
    }

    .project-card::after {
      content: '';
      position: absolute;
      bottom: 15%;
      right: 5%;
      width: 15%;
      height: 12%;
      background: radial-gradient(ellipse at center, rgba(80, 180, 255, 0.03) 0%, transparent 70%);
      pointer-events: none;
      border-radius: 50%;
      filter: blur(6px);
    }

    .project-card:hover {
      transform: translateY(-6px) scale(1.01);
      border-color: rgba(100, 200, 255, 0.08);
      box-shadow: 
        0 16px 48px rgba(0, 40, 80, 0.5),
        inset 0 0 80px rgba(80, 180, 255, 0.03),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
      background: 
        radial-gradient(ellipse at 25% 20%, rgba(120, 220, 255, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 75% 80%, rgba(60, 160, 255, 0.06) 0%, transparent 40%),
        radial-gradient(ellipse at 50% 50%, rgba(10, 14, 23, 0.4) 0%, rgba(10, 14, 23, 0.8) 100%);
    }

    .project-card h3 {
      font-size: 1.4rem;
      font-weight: 500;
      letter-spacing: 1px;
      color: #cce4ff;
      margin-bottom: 0.5rem;
      border-bottom: 1px solid rgba(80, 180, 255, 0.06);
      padding-bottom: 0.5rem;
      background: linear-gradient(135deg, #d0e8ff, #7fc0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 30px rgba(58, 168, 255, 0.05);
      position: relative;
      z-index: 1;
    }

    .project-card .desc {
      font-size: 0.95rem;
      color: #b0cef0;
      line-height: 1.5;
      margin: 0.5rem 0 1.2rem;
      flex: 1;
      opacity: 0.8;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
      position: relative;
      z-index: 1;
    }

    .project-card .placeholder-icon {
      font-size: 1.8rem;
      margin-bottom: 0.3rem;
      opacity: 0.2;
      letter-spacing: 4px;
      color: rgba(80, 180, 255, 0.3);
      text-shadow: 0 0 20px rgba(58, 168, 255, 0.05);
      position: relative;
      z-index: 1;
    }

    /* ===== 项目展开 (修复动画与层级) ===== */
    .project-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 200;
      background: rgba(10, 14, 23, 0.65);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .project-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .project-detail-card {
      width: 90%;
      max-width: 1000px;
      max-height: 85vh;
      border-radius: 32px;
      background: 
        radial-gradient(ellipse at 30% 20%, rgba(120, 200, 255, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 80%, rgba(60, 160, 255, 0.04) 0%, transparent 40%),
        radial-gradient(ellipse at 50% 50%, rgba(10, 14, 23, 0.7) 0%, rgba(10, 14, 23, 0.92) 100%);
      border: 1px solid rgba(255, 255, 255, 0.03);
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.8), inset 0 0 60px rgba(80, 180, 255, 0.02);
      transform: scale(0.92) translateY(30px);
      transition: transform 0.45s cubic-bezier(.22,1,.36,1), opacity 0.4s ease;
      opacity: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .project-overlay.active .project-detail-card {
      transform: scale(1) translateY(0);
      opacity: 1;
    }

    .detail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 28px;
      border-bottom: 1px solid rgba(80, 180, 255, 0.06);
      flex-shrink: 0;
    }

    .detail-title {
      font-size: 1.5rem;
      font-weight: 500;
      background: linear-gradient(135deg, #d0e8ff, #7fc0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .detail-close {
      background: none;
      border: none;
      color: #b0d8ff;
      font-size: 1.8rem;
      cursor: pointer;
      padding: 4px 12px;
      border-radius: 12px;
      transition: 0.3s ease;
      opacity: 0.6;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.03);
    }

    .detail-close:hover {
      opacity: 1;
      background: rgba(255,255,255,0.06);
      transform: rotate(90deg);
    }

    .detail-iframe-wrapper {
      flex: 1;
      padding: 8px 8px 8px 8px;
      min-height: 400px;
      position: relative;
    }

    .detail-iframe-wrapper iframe {
      width: 100%;
      height: 100%;
      min-height: 400px;
      border: none;
      border-radius: 16px;
      background: #0a0e17;
    }

    /* ===== 响应式 ===== */
    @media (max-width: 1024px) {
      .projects {
        grid-template-columns: repeat(2, 1fr);
        gap: 1.5rem;
      }
    }

    @media (max-width: 700px) {
      .navbar {
        gap: 20px;
        height: 65px;
        top: 16px;
      }
      .nav-item {
        font-size: 16px;
        padding: 10px 15px;
      }
      .home-card {
        padding: 40px 20px;
      }
      .home-card h1 {
        font-size: 50px;
        letter-spacing: 8px;
      }
      .home-card p {
        font-size: 18px;
        padding-left: 1rem;
      }
      .projects {
        grid-template-columns: 1fr;
        gap: 1.2rem;
      }
      .project-overlay {
        padding: 16px;
      }
      .project-detail-card {
        width: 100%;
        max-height: 90vh;
        border-radius: 20px;
      }
      .detail-header {
        padding: 14px 18px;
      }
      .detail-title {
        font-size: 1.2rem;
      }
      .detail-iframe-wrapper {
        min-height: 300px;
      }
      .detail-iframe-wrapper iframe {
        min-height: 300px;
      }
    }
  </style>
</head>
<body>

  <!-- 背景画布 (来自第1个文件) -->
  <canvas id="bg-canvas"></canvas>

  <!-- 液态玻璃导航 (来自第2个文件) -->
  <nav class="navbar">
    <div class="nav-item active" data-target="home">首页</div>
    <div class="nav-item" data-target="projects">项目</div>
    <div class="nav-line"></div>
  </nav>

  <main class="container">
    <!-- 首页 -->
    <section id="home" class="page home">
      <div class="home-card">
        <h1>LYX</h1>
        <p>开源小站<br>Hi陌生人</p>
      </div>
    </section>

    <!-- 项目页 -->
    <section id="projects" class="page" style="display:none;">
      <div class="projects" id="projectGrid"></div>
    </section>
  </main>
  <div class="project-overlay" id="projectOverlay">
    <div class="project-detail-card" id="projectDetailCard">
      <div class="detail-header">
        <span class="detail-title" id="detailTitle">项目名称</span>
        <button class="detail-close" id="detailClose">✕</button>
      </div>
      <div class="detail-iframe-wrapper">
        <iframe id="detailIframe" src="about:blank"></iframe>
      </div>
    </div>
  </div>

  <script>
    (function() {
    
      const canvas = document.getElementById('bg-canvas');
      const ctx = canvas.getContext('2d');
      let w = window.innerWidth, h = window.innerHeight;
      canvas.width = w;
      canvas.height = h;

      const SYMBOL_COUNT = 130;
      const BASE_SPEED = 0.25;
      const MAX_SPEED_VARY = 0.4;
      let symbols = [];
      const COLORS = [
        'rgba(80, 200, 255, 0.7)', 'rgba(50, 180, 255, 0.6)',
        'rgba(120, 220, 255, 0.5)', 'rgba(180, 130, 255, 0.5)',
        'rgba(60, 160, 255, 0.8)', 'rgba(30, 210, 230, 0.6)',
        'rgba(150, 200, 255, 0.5)'
      ];

      function drawTransistor(ctx, x, y, size, color, rotation = 0) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rotation);
        ctx.strokeStyle = color;
        ctx.lineWidth = 1.8;
        ctx.shadowColor = color;
        ctx.shadowBlur = 8;
        const s = size * 0.6;
        ctx.beginPath();
        ctx.arc(0, 0, s * 0.5, 0, Math.PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(-s * 0.8, -s * 0.5);
        ctx.lineTo(-s * 0.2, -s * 0.2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(-s * 0.2, -s * 0.2);
        ctx.lineTo(-s * 0.4, 0);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(s * 0.2, s * 0.2);
        ctx.lineTo(s * 0.8, s * 0.5);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(-s * 0.2, -s * 0.2, 3, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(s * 0.2, s * 0.2, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawCircuitNode(ctx, x, y, size, color) {
        ctx.save();
        ctx.translate(x, y);
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.shadowColor = color;
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(0, 0, size * 0.35, 0, Math.PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(-size * 0.5, -size * 0.5);
        ctx.lineTo(size * 0.5, size * 0.5);
        ctx.moveTo(size * 0.5, -size * 0.5);
        ctx.lineTo(-size * 0.5, size * 0.5);
        ctx.stroke();
        ctx.restore();
      }

      function drawCapacitor(ctx, x, y, size, color) {
        ctx.save();
        ctx.translate(x, y);
        ctx.strokeStyle = color;
        ctx.lineWidth = 2.2;
        ctx.shadowColor = color;
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.moveTo(-size * 0.25, -size * 0.6);
        ctx.lineTo(-size * 0.25, size * 0.6);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(size * 0.25, -size * 0.6);
        ctx.lineTo(size * 0.25, size * 0.6);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(-size * 0.25, -size * 0.6);
        ctx.lineTo(-size * 0.6, -size * 0.6);
        ctx.moveTo(size * 0.25, size * 0.6);
        ctx.lineTo(size * 0.6, size * 0.6);
        ctx.stroke();
        ctx.restore();
      }

      function createSymbol() {
        const type = Math.floor(Math.random() * 3);
        const size = 12 + Math.random() * 22;
        const x = Math.random() * w, y = Math.random() * h;
        const color = COLORS[Math.floor(Math.random() * COLORS.length)];
        const speed = BASE_SPEED + Math.random() * MAX_SPEED_VARY;
        const rotation = Math.random() * Math.PI * 2;
        return { type, x, y, size, color, speed, rotation };
      }

      function initSymbols() { symbols = []; for (let i = 0; i < SYMBOL_COUNT; i++) symbols.push(createSymbol()); }

      function drawScene() {
        ctx.clearRect(0, 0, w, h);
        ctx.save();
        for (let i = 0; i < symbols.length; i++) {
          const s1 = symbols[i];
          for (let j = 1; j <= 4; j++) {
            const idx = (i + j * 5) % symbols.length;
            const s2 = symbols[idx];
            if (!s1 || !s2) continue;
            const alpha = 0.12 + 0.08 * Math.sin(i + j);
            ctx.strokeStyle = `rgba(100, 200, 255, ${alpha})`;
            ctx.lineWidth = 0.7;
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.moveTo(s1.x, s1.y);
            ctx.lineTo(s2.x, s2.y);
            ctx.stroke();
          }
          const extra = (i + 13) % symbols.length;
          const s3 = symbols[extra];
          if (s3 && i !== extra) {
            ctx.strokeStyle = `rgba(130, 210, 255, 0.06)`;
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(s1.x, s1.y);
            ctx.lineTo(s3.x, s3.y);
            ctx.stroke();
          }
        }
        ctx.restore();
        for (let s of symbols) {
          const { type, x, y, size, color, rotation } = s;
          switch (type) {
            case 0: drawTransistor(ctx, x, y, size, color, rotation); break;
            case 1: drawCircuitNode(ctx, x, y, size, color); break;
            case 2: drawCapacitor(ctx, x, y, size, color); break;
          }
          ctx.beginPath();
          ctx.arc(x, y, 2, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(200, 240, 255, 0.4)';
          ctx.shadowBlur = 12;
          ctx.shadowColor = '#8ac4ff';
          ctx.fill();
        }
        ctx.save();
        ctx.strokeStyle = 'rgba(60, 160, 255, 0.03)';
        ctx.lineWidth = 0.5;
        for (let i = 0; i < w; i += 40) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, h); ctx.stroke(); }
        for (let i = 0; i < h; i += 40) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(w, i); ctx.stroke(); }
        ctx.restore();
      }

      function updatePositions() {
        for (let s of symbols) {
          s.y -= s.speed;
          if (s.y < -30) {
            s.y = h + 20 + Math.random() * 30;
            s.x = Math.random() * w;
            s.size = 12 + Math.random() * 26;
            s.type = Math.floor(Math.random() * 3);
            s.color = COLORS[Math.floor(Math.random() * COLORS.length)];
            s.speed = BASE_SPEED + Math.random() * MAX_SPEED_VARY;
            s.rotation = Math.random() * Math.PI * 2;
          }
        }
      }

      function animate() { updatePositions(); drawScene(); requestAnimationFrame(animate); }

      function handleResize() {
        w = window.innerWidth; h = window.innerHeight;
        canvas.width = w; canvas.height = h;
        for (let s of symbols) { s.x = Math.min(s.x, w - 10); s.y = Math.min(s.y, h - 10); if (s.x < 0) s.x = Math.random() * w; if (s.y < 0) s.y = Math.random() * h; }
      }

      initSymbols();
      animate();
      window.addEventListener('resize', handleResize);

      // ============================================================
      // 2. 项目数据 (来自第1个文件，更丰富)
      // ============================================================
      const projectData = [
        { title: 'α项目Α 像素文本绘制', desc: '基于上划线实现像素文本绘制，适用于wechat，QQ', link: 'alpha.html' },
        { title: 'β项目Β', desc: '敬请期待', link: 'beta.html' },
        { title: 'γ项目Γ', desc: '敬请期待', link: 'gamma.html' },
        { title: 'δ项目Δ', desc: '敬请期待', link: 'delta.html' },
        { title: 'ε项目Ε', desc: '敬请期待', link: 'epsilon.html' },
        { title: 'ζ项目Ζ', desc: '敬请期待', link: 'zeta.html' },
        { title: 'η项目Η', desc: '敬请期待', link: 'eta.html' },
        { title: 'θ项目Θ', desc: '敬请期待', link: 'theta.html' },
        { title: 'ι项目Ι', desc: '敬请期待', link: 'Iota.html' },
        { title: 'κ项目Κ', desc: '敬请期待', link: 'Kappa.html' },
        { title: 'λ项目Λ', desc: '敬请期待', link: 'Lambda.html' },
        { title: 'μ项目Μ', desc: '敬请期待', link: 'Mu.html' },
        { title: 'ν项目Ν', desc: '敬请期待', link: 'Nu.html' },
        { title: 'ξ项目Ξ', desc: '敬请期待', link: 'Xi.html' },
        { title: 'ο项目Ο', desc: '敬请期待', link: 'Omicron.html' },
        { title: 'π项目Π', desc: '敬请期待', link: 'Pi.html' },
        { title: 'ρ项目Ρ', desc: '敬请期待', link: 'Rho.html' },
        { title: 'σ项目Σ', desc: '敬请期待', link: 'Sigma.html' },
        { title: 'τ项目Τ', desc: '敬请期待', link: 'Tau.html' },
        { title: 'υ项目Υ', desc: '敬请期待', link: 'Upsilon.html' },
        { title: 'φ项目Φ', desc: '敬请期待', link: 'Phi.html' },
        { title: 'χ项目Χ', desc: '敬请期待', link: 'Chi.html' },
        { title: 'ψ项目Ψ', desc: '敬请期待', link: 'Psi.html' },
        { title: 'ω项目Ω', desc: '敬请期待', link: 'Omega.html' }
      ];

      // ============================================================
      // 3. 生成项目卡片 (使用独立弹窗)
      // ============================================================
      const grid = document.getElementById('projectGrid');
      if (grid) {
        projectData.forEach((item) => {
          const card = document.createElement('div');
          card.className = 'project-card';
          card.dataset.link = item.link;
          card.dataset.title = item.title;
          card.dataset.desc = item.desc;

          const icon = document.createElement('div');
          icon.className = 'placeholder-icon';
          icon.textContent = '◈';
          card.appendChild(icon);

          const title = document.createElement('h3');
          title.textContent = item.title;
          card.appendChild(title);

          const desc = document.createElement('p');
          desc.className = 'desc';
          desc.textContent = item.desc;
          card.appendChild(desc);

          card.addEventListener('click', function() {
            openProjectDetail(this.dataset.title, this.dataset.link);
          });

          grid.appendChild(card);
        });
      }

      // ============================================================
      // 4. 项目详情弹窗 (独立于卡片，修复动画与层级)
      // ============================================================
      const overlay = document.getElementById('projectOverlay');
      const detailTitle = document.getElementById('detailTitle');
      const detailIframe = document.getElementById('detailIframe');
      const detailClose = document.getElementById('detailClose');

      function openProjectDetail(title, link) {
        detailTitle.textContent = title;
        // 如果 link 有效则加载，否则显示占位
        if (link && link !== '？.html' && link !== '#') {
          detailIframe.src = link;
        } else {
          detailIframe.src = 'about:blank';
          detailIframe.srcdoc = `
            <html>
              <head><style>
                body { 
                  background: #0a0e17; 
                  color: #b0cef0; 
                  font-family: 'Segoe UI', sans-serif;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  height: 100vh;
                  margin: 0;
                  font-size: 1.2rem;
                  opacity: 0.5;
                }
              </style></head>
              <body>
                <div style="text-align:center;">
                  <div style="font-size:3rem;margin-bottom:20px;">◈</div>
                  <div>项目页面正在建设中</div>
                  <div style="font-size:0.9rem;margin-top:10px;opacity:0.5;">敬请期待</div>
                </div>
              </body>
            </html>
          `;
        }
        overlay.classList.add('active');
        document.body.style.overflow = 'hidden';
      }

      function closeProjectDetail() {
        overlay.classList.remove('active');
        document.body.style.overflow = '';
        // 延迟清空 iframe 以释放资源
        setTimeout(() => {
          if (!overlay.classList.contains('active')) {
            detailIframe.src = 'about:blank';
          }
        }, 500);
      }

      detailClose.addEventListener('click', closeProjectDetail);

      // 点击遮罩关闭
      overlay.addEventListener('click', function(e) {
        if (e.target === this) {
          closeProjectDetail();
        }
      });

      // ESC 关闭
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && overlay.classList.contains('active')) {
          closeProjectDetail();
        }
      });

      // ============================================================
      // 5. 导航系统 (来自第2个文件)
      // ============================================================
      const navItems = document.querySelectorAll('.nav-item');
      const navLine = document.querySelector('.nav-line');
      let currentPage = 'home';

      function moveLine(target) {
        const rect = target.getBoundingClientRect();
        const parent = target.parentElement.getBoundingClientRect();
        navLine.style.left = (rect.left - parent.left + (rect.width - 80) / 2) + 'px';
      }

      moveLine(document.querySelector('.nav-item.active'));

      navItems.forEach((item, index) => {
        item.onclick = () => {
          if (item.dataset.target === currentPage) return;
          const old = currentPage;
          currentPage = item.dataset.target;
          navItems.forEach(n => n.classList.remove('active'));
          item.classList.add('active');
          moveLine(item);

          const oldPage = document.getElementById(old);
          const newPage = document.getElementById(currentPage);

          oldPage.animate([
            { opacity: 1, transform: 'translateX(0)' },
            { opacity: 0, transform: index === 0 ? 'translateX(100px)' : 'translateX(-100px)' }
          ], { duration: 400, easing: 'cubic-bezier(.22,1,.36,1)' });

          setTimeout(() => {
            oldPage.style.display = 'none';
            newPage.style.display = 'block';
            newPage.animate([
              { opacity: 0, transform: index === 0 ? 'translateX(-120px)' : 'translateX(120px)' },
              { opacity: 1, transform: 'translateX(0)' }
            ], { duration: 600, easing: 'cubic-bezier(.22,1,.36,1)' });

            if (currentPage === 'projects') showProjects();
          }, 400);
        };
      });

      // ============================================================
      // 6. 项目逐个进入动画 (来自第2个文件)
      // ============================================================
      function showProjects() {
        const cards = document.querySelectorAll('.project-card');
        cards.forEach((card, i) => {
          setTimeout(() => {
            card.classList.add('show');
          }, i * 120);
        });
      }

      // 页面初始化：显示首页
      document.getElementById('home').style.display = 'block';
      document.getElementById('projects').style.display = 'none';
    })();
  </script>
</body>
</html>
